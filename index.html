<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json" />
  <title>hololive OCG Decklog Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh;background:#0b0b0b;color:#fff;}
  .hero{position:relative;min-height:100vh;min-height:100svh;display:flex;align-items:center;justify-content:center;}
  .hero::before{content:"";position:absolute;inset:0;background:url("https://hololive-official-cardgame.com/wp-content/uploads/2024/09/img_main-2.jpg") center center/cover no-repeat;filter:brightness(0.5);}
  .hero-image-mobile{display:none;width:100%;height:auto;border-radius:12px;}
    .hero-content{position:relative;z-index:1;text-align:center;padding:24px;max-width:720px;}
    .hero-card{background:rgba(10,10,10,0.72);backdrop-filter:blur(6px);border-radius:18px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.45);}
    .hero-title{font-size:clamp(28px,4vw,44px);font-weight:700;}
    .hero-subtitle{font-size:clamp(14px,2.3vw,18px);color:#d6d6d6;margin:12px 0 24px;}
    .hero-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
    .event-section{margin-top:20px;text-align:left;}
    .event-label{font-size:15px;font-weight:600;color:#bbb;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.15);padding-bottom:6px;}
    @media (max-width:600px){
      .hero{min-height:auto;padding:24px 0;}
      .hero::before{display:none;}
      .hero-image-mobile{display:block;margin-bottom:16px;}
      .hero-card{padding:20px;border-radius:14px;}
      .hero-buttons .btn{width:100%;}
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <div class="hero-card">
        <img class="hero-image-mobile" src="https://hololive-official-cardgame.com/wp-content/uploads/2024/09/img_main-2.jpg" alt="hololive Official Card Game">
        <div class="hero-title">hololive OCG Decklog Portal</div>
        <div class="hero-subtitle">Browse decklog lists and deck images from hololive Official Card Game tournament events.</div>
        <div class="event-section">
          <div class="event-label">WGP 2025-26 Aichi</div>
          <div class="hero-buttons">
            <a class="btn btn-primary btn-lg" href="team.html">Team</a>
            <a class="btn btn-outline-light btn-lg" href="single.html">Single</a>
          </div>
        </div>
        <div class="event-section">
          <div class="event-label">ホロカぐるっとツアー 2026 Miyagi</div>
          <div class="hero-buttons">
            <a class="btn btn-warning btn-lg" href="miyagi_team.html">Team</a>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
